<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Mis Vuelos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="my-flights-container">
        <div class="my-flights-wrapper">
            <header class="my-flights-header">
                <img src="img/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Mis Vuelos</h1>
            </header>

            <section class="my-flights-content">
                <ul class="flights-list">
                    <li class="flight-item">
                        <div class="flight-info">
                            <h2 class="flight-route">Bogotá - Medellín</h2>
                            <p class="flight-date">15 de junio, 2024</p>
                            <p class="flight-time">08:00</p>
                            <p class="flight-status">Confirmado</p>
                        </div>
                    </li>

                    <li class="flight-item">
                        <div class="flight-info">
                            <h2 class="flight-route">Medellín - Cartagena</h2>
                            <p class="flight-date">16 de junio, 2024</p>
                            <p class="flight-time">14:00</p>
                            <p class="flight-status">Confirmado</p>
                        </div>
                    </li>

                    <li class="flight-item">
                        <div class="flight-info">
                            <h2 class="flight-route">Cartagena - Bogotá</h2>
                            <p class="flight-date">20 de junio, 2024</p>
                            <p class="flight-time">10:30</p>
                            <p class="flight-status">Pendiente</p>
                        </div>
                    </li>
                </ul>
            </section>

            <div class="my-flights-actions">
                <a href="menu.html" class="btn btn-secondary">Volver al menú principal</a>
            </div>
        </div>
    </main>
</body>
</html>
