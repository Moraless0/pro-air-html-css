<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Recuperar Contraseña</title>
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="form-container">
        <div class="form-wrapper">
            <header class="form-header">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Recuperar Contraseña</h1>
            </header>

            <form class="recovery-form" action="crear-contraseña.html" method="get">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Ingresa tu correo electrónico"
                        required
                        aria-required="true"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>

            <div class="form-links">
                <a href="index.html" class="link">Volver al inicio de sesión</a>
            </div>
        </div>
    </main>
</body>
</html>
