<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Buscando Vuelos</title>
    <meta http-equiv="refresh" content="3;url=vuelos.html">
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
            padding: var(--spacing-md);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--color-gray-dark);
            border-top: 4px solid var(--color-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--glow-secondary);
        }

        .loading-text {
            color: var(--color-text-primary);
            font-size: var(--font-size-large);
            font-weight: 600;
            text-align: center;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        .loading-subtext {
            color: var(--color-text-secondary);
            font-size: var(--font-size-small);
            margin-top: var(--spacing-sm);
            text-align: center;
        }

        .loading-dots {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-lg);
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--color-secondary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
            box-shadow: var(--glow-secondary);
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
        }

        .search-icon {
            font-size: 4rem;
            animation: pulse 2s ease-in-out infinite;
            margin-bottom: var(--spacing-lg);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="search-icon">🔍</div>
        <div class="loading-spinner"></div>
        <h1 class="loading-text">Buscando Vuelos</h1>
        <p class="loading-subtext">Buscando los mejores vuelos para ti...</p>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
