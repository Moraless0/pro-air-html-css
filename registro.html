<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Registro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="form-container">
        <div class="form-wrapper">
            <header class="form-header">
                <img src="img/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Crear cuenta</h1>
            </header>

            <form class="registration-form" action="crear-contraseña.html" method="get">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Ingresa tu nombre completo"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="identificacion">Identificación</label>
                    <input 
                        type="text" 
                        id="identificacion" 
                        name="identificacion" 
                        placeholder="Ingresa tu número de identificación"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Ingresa tu correo electrónico"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input 
                        type="tel" 
                        id="telefono" 
                        name="telefono" 
                        placeholder="Ingresa tu número de teléfono"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input 
                        type="text" 
                        id="ciudad" 
                        name="ciudad" 
                        placeholder="Ingresa tu ciudad"
                        required
                        aria-required="true"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>

            <div class="form-links">
                <a href="index.html" class="link">Volver al inicio de sesión</a>
            </div>
        </div>
    </main>
</body>
</html>
