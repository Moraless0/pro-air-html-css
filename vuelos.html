<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Vuelos Disponibles</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="flights-container">
        <div class="flights-wrapper">
            <header class="flights-header">
                <img src="img/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Vuelos Disponibles</h1>
            </header>

            <section class="flights-content">
                <table class="flights-table">
                    <thead>
                        <tr>
                            <th scope="col">Ruta</th>
                            <th scope="col">Fecha</th>
                            <th scope="col">Hora</th>
                            <th scope="col">Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Bogotá - Medellín</td>
                            <td>2024-06-15</td>
                            <td>08:00</td>
                            <td>$250.000</td>
                        </tr>
                        <tr>
                            <td>Bogotá - Cali</td>
                            <td>2024-06-15</td>
                            <td>10:30</td>
                            <td>$180.000</td>
                        </tr>
                        <tr>
                            <td>Medellín - Cartagena</td>
                            <td>2024-06-16</td>
                            <td>14:00</td>
                            <td>$320.000</td>
                        </tr>
                        <tr>
                            <td>Cali - Barranquilla</td>
                            <td>2024-06-16</td>
                            <td>16:45</td>
                            <td>$280.000</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <div class="flights-actions">
                <a href="menu.html" class="btn btn-secondary">Volver al menú principal</a>
            </div>
        </div>
    </main>
</body>
</html>
