<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Iniciar Sesión</title>
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="login-container">
        <div class="login-wrapper">
            <header class="login-header">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Iniciar Sesión</h1>
            </header>

            <form class="login-form" action="loading-login.html" method="get">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Ingresa tu correo"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingresa tu contraseña"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Recordar mis datos</label>
                </div>

                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>

            <div class="login-links">
                <a href="registro.html" class="link">Crear cuenta</a>
                <a href="recuperar.html" class="link">¿Has olvidado tu contraseña?</a>
            </div>
        </div>
    </main>
</body>
</html>
