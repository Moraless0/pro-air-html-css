<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Búsqueda de Vuelos</title>
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="nav-mobile">
        <div class="nav-mobile-content">
            <a href="menu.html" class="nav-mobile-logo">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR">
                <span>PRO AIR</span>
            </a>
            <div class="nav-mobile-links">
                <a href="menu.html" class="nav-mobile-link">Inicio</a>
                <a href="index.html" class="nav-mobile-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <nav class="nav-bar">
        <div class="nav-content">
            <a href="menu.html" class="nav-logo">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR">
                <span>PRO AIR</span>
            </a>
            <div class="nav-links">
                <a href="menu.html" class="nav-link">Inicio</a>
                <a href="buscar-vuelos.html" class="nav-link">Buscar Vuelos</a>
                <a href="mis-vuelos.html" class="nav-link">Mis Vuelos</a>
                <a href="checkin.html" class="nav-link">Check-in</a>
            </div>
            <div class="nav-user">
                <span class="nav-username">Usuario</span>
                <a href="index.html" class="btn btn-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <main class="form-container">
        <div class="form-wrapper">
            <header class="form-header">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Buscar Vuelos</h1>
            </header>

            <form class="search-form" action="loading-busqueda.html" method="get">
                <div class="form-group">
                    <label for="origen">Origen</label>
                    <input 
                        type="text" 
                        id="origen" 
                        name="origen" 
                        placeholder="Ciudad de origen"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="destino">Destino</label>
                    <input 
                        type="text" 
                        id="destino" 
                        name="destino" 
                        placeholder="Ciudad de destino"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="fecha-salida">Fecha de salida</label>
                    <input 
                        type="date" 
                        id="fecha-salida" 
                        name="fecha-salida" 
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="fecha-regreso">Fecha de regreso</label>
                    <input 
                        type="date" 
                        id="fecha-regreso" 
                        name="fecha-regreso"
                    >
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="solo-ida" name="solo-ida">
                    <label for="solo-ida">Solo ida</label>
                </div>

                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>

            <div class="form-links">
                <a href="menu.html" class="link">Volver al menú principal</a>
            </div>
        </div>
    </main>
</body>
</html>
