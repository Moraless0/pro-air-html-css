<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Búsqueda de Vuelos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <main class="form-container">
        <div class="form-wrapper">
            <header class="form-header">
                <img src="img/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Buscar Vuelos</h1>
            </header>

            <form class="search-form" action="vuelos.html" method="get">
                <div class="form-group">
                    <label for="origen">Origen</label>
                    <input 
                        type="text" 
                        id="origen" 
                        name="origen" 
                        placeholder="Ciudad de origen"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="destino">Destino</label>
                    <input 
                        type="text" 
                        id="destino" 
                        name="destino" 
                        placeholder="Ciudad de destino"
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="fecha-salida">Fecha de salida</label>
                    <input 
                        type="date" 
                        id="fecha-salida" 
                        name="fecha-salida" 
                        required
                        aria-required="true"
                    >
                </div>

                <div class="form-group">
                    <label for="fecha-regreso">Fecha de regreso</label>
                    <input 
                        type="date" 
                        id="fecha-regreso" 
                        name="fecha-regreso"
                    >
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="solo-ida" name="solo-ida">
                    <label for="solo-ida">Solo ida</label>
                </div>

                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>

            <div class="form-links">
                <a href="menu.html" class="link">Volver al menú principal</a>
            </div>
        </div>
    </main>
</body>
</html>
