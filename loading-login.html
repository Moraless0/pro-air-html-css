<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Iniciando Sesión</title>
    <meta http-equiv="refresh" content="3;url=menu.html">
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loading-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--color-gradient-start), var(--color-gradient-end));
            padding: var(--spacing-md);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--color-gray-dark);
            border-top: 4px solid var(--color-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--glow-secondary);
        }

        .loading-text {
            color: var(--color-text-primary);
            font-size: var(--font-size-large);
            font-weight: 600;
            text-align: center;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        .loading-subtext {
            color: var(--color-text-secondary);
            font-size: var(--font-size-small);
            margin-top: var(--spacing-sm);
            text-align: center;
        }

        .login-icon {
            font-size: 4rem;
            animation: pulse 2s ease-in-out infinite;
            margin-bottom: var(--spacing-lg);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .welcome-text {
            color: var(--color-primary);
            font-size: var(--font-size-base);
            font-weight: 500;
            margin-top: var(--spacing-lg);
            text-align: center;
            animation: slideIn 1s ease-out;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        @keyframes slideIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="login-icon">🔐</div>
        <div class="loading-spinner"></div>
        <h1 class="loading-text">Iniciando Sesión</h1>
        <p class="loading-subtext">Verificando tus credenciales...</p>
        <p class="welcome-text">¡Bienvenido de nuevo!</p>
    </div>
</body>
</html>
