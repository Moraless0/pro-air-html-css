<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO AIR - Check-In</title>
    <link rel="icon" href="./img/icons/icono.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="nav-mobile">
        <div class="nav-mobile-content">
            <a href="menu.html" class="nav-mobile-logo">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR">
                <span>PRO AIR</span>
            </a>
            <div class="nav-mobile-links">
                <a href="menu.html" class="nav-mobile-link">Inicio</a>
                <a href="index.html" class="nav-mobile-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <nav class="nav-bar">
        <div class="nav-content">
            <a href="menu.html" class="nav-logo">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR">
                <span>PRO AIR</span>
            </a>
            <div class="nav-links">
                <a href="menu.html" class="nav-link">Inicio</a>
                <a href="buscar-vuelos.html" class="nav-link">Buscar Vuelos</a>
                <a href="mis-vuelos.html" class="nav-link">Mis Vuelos</a>
                <a href="checkin.html" class="nav-link">Check-in</a>
            </div>
            <div class="nav-user">
                <span class="nav-username">Usuario</span>
                <a href="index.html" class="btn btn-logout">Cerrar sesión</a>
            </div>
        </div>
    </nav>
    <main class="form-container">
        <div class="form-wrapper">
            <header class="form-header">
                <img src="./img/icons/logo.png" alt="Logo PRO AIR" class="logo">
                <h1>Check-In</h1>
            </header>

            <form class="checkin-form" action="menu.html" method="get">
                <div class="form-group">
                    <label for="numero-vuelo">Número de vuelo o reserva</label>
                    <input 
                        type="text" 
                        id="numero-vuelo" 
                        name="numero-vuelo" 
                        placeholder="Ingresa el número de vuelo o reserva"
                        required
                        aria-required="true"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>

            <div class="form-links">
                <a href="menu.html" class="link">Volver al menú principal</a>
            </div>
        </div>
    </main>
</body>
</html>
