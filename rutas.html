            <div class="nav-mobile-links">
                <a href="menu.html" class="nav-mobile-link">Inicio</a>

            </div>
        </div>
    </nav>
    <nav class="nav-bar">

    <main class="routes-container">
        <section class="routes-wrapper">
            <header class="routes-header">
                <span class="routes-kicker">Red global de destinos</span>
                <h1>Nuestras Rutas</h1>
                <p>
                    Explora las principales ciudades conectadas por PRO AIR y descubre precios
                    aproximados para tu próximo viaje.
                </p>
            </header>

            <div class="routes-map" aria-label="Mapa visual de rutas internacionales de PRO AIR">
                <div class="colombia-map" aria-hidden="true">
                    <svg class="colombia-svg" viewBox="0 0 612.82184 693.68036" role="img" aria-label="Mapa de Colombia">
                        <use href="img/colombia.svg#CO-AMA"></use>
                        <use href="img/colombia.svg#CO-ANT"></use>
                        <use href="img/colombia.svg#CO-ARA"></use>
                        <use href="img/colombia.svg#CO-ATL"></use>
                        <use href="img/colombia.svg#CO-BOL"></use>
                        <use href="img/colombia.svg#CO-BOY"></use>
                        <use href="img/colombia.svg#CO-CAL"></use>
                        <use href="img/colombia.svg#CO-CAQ"></use>
                        <use href="img/colombia.svg#CO-CAS"></use>
                        <use href="img/colombia.svg#CO-CAU"></use>
                        <use href="img/colombia.svg#CO-CES"></use>
                        <use href="img/colombia.svg#CO-CHO"></use>
                        <use href="img/colombia.svg#CO-COR"></use>
                        <use href="img/colombia.svg#CO-CUN"></use>
                        <use href="img/colombia.svg#CO-DC"></use>
                        <use href="img/colombia.svg#CO-GUA"></use>
                        <use href="img/colombia.svg#CO-GUV"></use>
                        <use href="img/colombia.svg#CO-HUI"></use>
                        <use href="img/colombia.svg#CO-LAG"></use>
                        <use href="img/colombia.svg#CO-MAG"></use>
                        <use href="img/colombia.svg#CO-MET"></use>
                        <use href="img/colombia.svg#CO-NAR"></use>
                        <use href="img/colombia.svg#CO-NSA"></use>
                        <use href="img/colombia.svg#CO-PUT"></use>
                        <use href="img/colombia.svg#CO-QUI"></use>
                        <use href="img/colombia.svg#CO-RIS"></use>
                        <use href="img/colombia.svg#CO-SAN"></use>
                        <use href="img/colombia.svg#CO-SAP"></use>
                        <use href="img/colombia.svg#CO-SUC"></use>
                        <use href="img/colombia.svg#CO-TOL"></use>
                        <use href="img/colombia.svg#CO-VAC"></use>
                        <use href="img/colombia.svg#CO-VAU"></use>
                        <use href="img/colombia.svg#CO-VID"></use>
                    </svg>
                </div>

                <button class="route-marker bogota" type="button" aria-label="Bogotá desde $120 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">
                        <strong>Bogotá</strong>
                        Desde $120 USD
                    </span>
                </button>

                <button class="route-marker medellin" type="button" aria-label="Medellín desde $135 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">
                        <strong>Medellín</strong>
                        Desde $135 USD
                    </span>
                </button>

                <button class="route-marker cali" type="button" aria-label="Cali desde $128 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">

                        Desde $128 USD
                    </span>

                <button class="route-marker barranquilla" type="button" aria-label="Barranquilla desde $145 USD">

                <button class="route-marker santa-marta" type="button" aria-label="Santa Marta desde $148 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">
                        <strong>Santa Marta</strong>

                    </span>

                <button class="route-marker manizales" type="button" aria-label="Manizales desde $118 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">
                        <strong>Manizales</strong>
                        Desde $118 USD
                    </span>
                </button>

                <button class="route-marker armenia" type="button" aria-label="Armenia desde $115 USD">
                    <span class="marker-dot"></span>
                    <span class="marker-tooltip">
                        <strong>Armenia</strong>
                        Desde $115 USD
                    </span>
